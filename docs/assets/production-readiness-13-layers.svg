<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Thirteen production readiness layers</title>
  <desc id="desc">The 13 production readiness layers checked by the Valdris SDLC Harness: frontend, backend/API, database, auth, hosting/deploy, cloud compute, CI/CD, security, rate limiting, caching/CDN, load balancing/scaling, observability, and recovery/DR.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#081017"/><stop offset="1" stop-color="#141316"/></linearGradient>
    <linearGradient id="card" x1="0" x2="1"><stop offset="0" stop-color="#111e26"/><stop offset="1" stop-color="#17202b"/></linearGradient>
    <linearGradient id="hot" x1="0" x2="1"><stop offset="0" stop-color="#134e4a"/><stop offset="1" stop-color="#0f766e"/></linearGradient>
    <style>
      .title { font: 900 54px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #fff; letter-spacing: -1px; }
      .sub { font: 500 22px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #a9bdc7; }
      .num { font: 900 23px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #071016; }
      .label { font: 850 24px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #eff6ff; }
      .hint { font: 550 16px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #a6b4bd; }
      .foot { font: 800 18px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #d9f99d; letter-spacing: .3px; }
      .card { fill: url(#card); stroke: #263d49; stroke-width: 1.5; rx: 24; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1400" cy="120" r="260" fill="#0ea5e9" opacity=".07"/>
  <circle cx="200" cy="820" r="310" fill="#f59e0b" opacity=".06"/>

  <text x="70" y="92" class="title">13-layer production readiness stack</text>
  <text x="72" y="132" class="sub">Every serious run marks each layer as required, passed, failed, pending, or skipped with a reason.</text>

  <g transform="translate(70,180)">
    <rect class="card" x="0" y="0" width="330" height="120"/><circle cx="42" cy="42" r="24" fill="#67e8f9"/><text x="34" y="50" class="num">1</text><text x="82" y="42" class="label">Frontend</text><text x="82" y="76" class="hint">UI, routes, browser/e2e proof</text>
    <rect class="card" x="370" y="0" width="330" height="120"/><circle cx="412" cy="42" r="24" fill="#67e8f9"/><text x="404" y="50" class="num">2</text><text x="452" y="42" class="label">Backend / API</text><text x="452" y="76" class="hint">contracts, logs, request proof</text>
    <rect class="card" x="740" y="0" width="330" height="120"/><circle cx="782" cy="42" r="24" fill="#67e8f9"/><text x="774" y="50" class="num">3</text><text x="822" y="42" class="label">Database / storage</text><text x="822" y="76" class="hint">migrations, integrity, rollback</text>
    <rect class="card" x="1110" y="0" width="330" height="120"/><circle cx="1152" cy="42" r="24" fill="#67e8f9"/><text x="1144" y="50" class="num">4</text><text x="1192" y="42" class="label">Auth / permissions</text><text x="1192" y="76" class="hint">RLS, tenant boundaries, negatives</text>

    <rect class="card" x="0" y="155" width="330" height="120"/><circle cx="42" cy="197" r="24" fill="#67e8f9"/><text x="34" y="205" class="num">5</text><text x="82" y="197" class="label">Hosting / deploy</text><text x="82" y="231" class="hint">health, preview/prod, rollback</text>
    <rect class="card" x="370" y="155" width="330" height="120"/><circle cx="412" cy="197" r="24" fill="#67e8f9"/><text x="404" y="205" class="num">6</text><text x="452" y="197" class="label">Cloud / compute</text><text x="452" y="231" class="hint">service map, IAM, topology</text>
    <rect class="card" x="740" y="155" width="330" height="120"/><circle cx="782" cy="197" r="24" fill="#67e8f9"/><text x="774" y="205" class="num">7</text><text x="822" y="197" class="label">CI/CD + versioning</text><text x="822" y="231" class="hint">checks, workflows, branch policy</text>
    <rect class="card" x="1110" y="155" width="330" height="120"/><circle cx="1152" cy="197" r="24" fill="#67e8f9"/><text x="1144" y="205" class="num">8</text><text x="1192" y="197" class="label">Security</text><text x="1192" y="231" class="hint">secrets, threat model, attack surface</text>

    <rect class="card" x="0" y="310" width="330" height="120"/><circle cx="42" cy="352" r="24" fill="#67e8f9"/><text x="34" y="360" class="num">9</text><text x="82" y="352" class="label">Rate limiting</text><text x="82" y="386" class="hint">abuse, quotas, burst behavior</text>
    <rect class="card" x="370" y="310" width="330" height="120"/><circle cx="412" cy="352" r="24" fill="#67e8f9"/><text x="399" y="360" class="num">10</text><text x="452" y="352" class="label">Caching / CDN</text><text x="452" y="386" class="hint">invalidation, stale data proof</text>
    <rect class="card" x="740" y="310" width="330" height="120"/><circle cx="782" cy="352" r="24" fill="#67e8f9"/><text x="771" y="360" class="num">11</text><text x="822" y="352" class="label">Load balancing / scale</text><text x="822" y="386" class="hint">capacity, concurrency, failover</text>
    <rect class="card" x="1110" y="310" width="330" height="120"/><circle cx="1152" cy="352" r="24" fill="#67e8f9"/><text x="1139" y="360" class="num">12</text><text x="1192" y="352" class="label">Observability</text><text x="1192" y="386" class="hint">logs, metrics, traces, alerts</text>

    <rect x="185" y="490" width="1070" height="138" rx="30" fill="url(#hot)" stroke="#5eead4" stroke-width="2"/>
    <circle cx="245" cy="550" r="28" fill="#ccfbf1"/><text x="230" y="559" class="num">13</text>
    <text x="296" y="544" class="label">Availability / recovery / disaster recovery</text>
    <text x="296" y="584" class="hint" fill="#dffbf6">rollback, backup/restore, graceful degradation, RTO/RPO, incident handoff</text>
  </g>

  <rect x="70" y="825" width="1460" height="42" rx="21" fill="#202b21" stroke="#84cc16"/>
  <text x="104" y="852" class="foot">Nick-standard proof target: enterprise-minded from the jump — scale, rollback, security, observability, cost, and domain-specific evidence.</text>
</svg>
