<svg width="1600" height="760" viewBox="0 0 1600 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Valdris SDLC Harness control-plane overview</title>
  <desc id="desc">A connector-first control plane flow: commission repo and team, generate adapter, install agent front doors, connect Claude Code, Codex, Hermes, stream events and artifacts, enforce gates, hand off proof.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#071016"/>
      <stop offset="50%" stop-color="#10151f"/>
      <stop offset="100%" stop-color="#1b1410"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" x2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" x2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .small { font: 500 21px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #9fb7c0; }
      .label { font: 800 28px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #f5f7f8; }
      .micro { font: 600 16px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #9fb7c0; }
      .title { font: 900 58px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #ffffff; letter-spacing: -1.5px; }
      .chip { font: 800 15px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #071016; letter-spacing: .5px; }
      .node { fill: rgba(9, 17, 24, .92); stroke: #1f3a44; stroke-width: 2; rx: 26; }
      .nodeHot { fill: rgba(19, 20, 16, .96); stroke: #b67a22; stroke-width: 2; rx: 26; }
      .arrow { stroke: #5fbfd0; stroke-width: 4; fill: none; marker-end: url(#arrowHead); opacity: .9; }
      .arrowAmber { stroke: #e59b31; stroke-width: 4; fill: none; marker-end: url(#arrowHeadAmber); opacity: .95; }
    </style>
    <marker id="arrowHead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#5fbfd0"/>
    </marker>
    <marker id="arrowHeadAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#e59b31"/>
    </marker>
  </defs>

  <rect width="1600" height="760" fill="url(#bg)"/>
  <circle cx="1320" cy="120" r="190" fill="#0ea5e9" opacity=".08"/>
  <circle cx="170" cy="620" r="240" fill="#f97316" opacity=".07"/>
  <path d="M70 630 C 370 520, 580 710, 900 590 S 1300 490, 1530 610" stroke="#203a43" stroke-width="2" fill="none" opacity=".8"/>

  <text x="70" y="92" class="title">Valdris SDLC Harness</text>
  <text x="72" y="132" class="small">Connector-first control plane for AI-assisted software delivery — not an IDE, not a prompt pile.</text>

  <rect x="70" y="174" width="254" height="118" class="node"/>
  <text x="98" y="220" class="label">Commission</text>
  <text x="100" y="254" class="micro">repo + team interview</text>
  <text x="100" y="278" class="micro">source-of-truth + risk map</text>

  <rect x="385" y="174" width="254" height="118" class="node"/>
  <text x="413" y="220" class="label">Adapter</text>
  <text x="415" y="254" class="micro">project-adapter.json</text>
  <text x="415" y="278" class="micro">lanes, gates, proof policy</text>

  <rect x="700" y="174" width="254" height="118" class="node"/>
  <text x="728" y="220" class="label">Front doors</text>
  <text x="730" y="254" class="micro">AGENTS.md / CLAUDE.md</text>
  <text x="730" y="278" class="micro">Codex + Claude prompts</text>

  <rect x="1015" y="174" width="254" height="118" class="node"/>
  <text x="1043" y="220" class="label">Runtime</text>
  <text x="1045" y="254" class="micro">Claude Code / Codex</text>
  <text x="1045" y="278" class="micro">Hermes / future agents</text>

  <rect x="330" y="402" width="294" height="132" class="nodeHot"/>
  <text x="358" y="450" class="label">Connector bridge</text>
  <text x="360" y="484" class="micro">strict event contract</text>
  <text x="360" y="508" class="micro">artifact + approval validation</text>

  <rect x="680" y="402" width="294" height="132" class="node"/>
  <text x="708" y="450" class="label">Event ledger</text>
  <text x="710" y="484" class="micro">JSONL / run packet / DB later</text>
  <text x="710" y="508" class="micro">Blueprint · Live Run · Replay</text>

  <rect x="1030" y="402" width="294" height="132" class="nodeHot"/>
  <text x="1058" y="450" class="label">Gate engine</text>
  <text x="1060" y="484" class="micro">proof · red zone · smoke</text>
  <text x="1060" y="508" class="micro">finish-line blocks fake done</text>

  <path class="arrow" d="M324 233 L378 233"/>
  <path class="arrow" d="M639 233 L693 233"/>
  <path class="arrow" d="M954 233 L1008 233"/>
  <path class="arrowAmber" d="M1142 292 C1135 358, 650 356, 530 402"/>
  <path class="arrow" d="M624 468 L673 468"/>
  <path class="arrowAmber" d="M974 468 L1023 468"/>
  <path class="arrowAmber" d="M1177 534 C1130 630, 548 638, 478 534"/>

  <rect x="70" y="622" width="1460" height="64" rx="32" fill="url(#cyan)" opacity=".95" filter="url(#softGlow)"/>
  <text x="110" y="662" class="chip">DONE MEANS ARTIFACTS EXIST: graph/graph.json · design/anchors.json · proof/proof.json · smoke/smoke_proof.json · handoff/final.md</text>
</svg>
